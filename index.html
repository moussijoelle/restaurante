<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurante Mamamia</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @import "tailwindcss";

      @layer base {
        p,
        h1,
        h2,
        h3 {
          @apply mb-2 leading-relaxed text-gray-700;
        }
        h1,
        h2,
        h3 {
          @apply mt-2 font-bold text-slate-500;
        }
        input {
          @apply rounded-sm border-1 border-blue-800 text-black font-mono;
        }

        button {
          @apply rounded-md shadow-xs border-2 border-slate-400 px-4 py-[0.5] my-1;
        }
        code {
          @apply text-blue-800;
        }
      }
    </style>
  </head>

  <body>
    <main
      class="container mx-auto flex flex-col items-center gap-12 p-6 border-4 border-blue-800 min-h-screen bg-slate-950 text-slate-50"
    >
      <h1
        class="mb-10 text-center text-6xl font-bold text-amber-400 drop-shadow-[0_0_14px_rgba(255,255,255,0.95)]"
      >
        Restaurante Mamamia
      </h1>
      <p class="text-center text-white/90 -mt-8 text-2xl">
        Come como si estuvieras en casa.😋
      </p>
      <div
        class="mx-auto flex w-full max-w-3xl flex-col gap-4 border-4 border-blue-800 bg-white p-4 sm:flex-row sm:items-start sm:gap-6"
      >
        <div class="flex min-w-0 flex-1 flex-col gap-4">
          <div class="flex flex-row items-center gap-4 flex-wrap">
            
            <h2 class="w-full text-center text-2xl font-bold text-amber-400">
                Aquí están los 3 platos principales de la casa.🍝
              </h2>
              
              <select id="operador" class="w-auto max-w-xs rounded-md bg-slate-950 px-3 py-2 text-slate-50 border border-slate-700">
                <option value="carne">carne</option>
                <option value="pasta">pasta (con gluten)</option>
                <option value="risotto">risotto (con lactosa)</option>
              </select>
              
              <p class="text-2xl text-slate-900">
                Preferencias😊 o intolerancias😥🤢🤮
              </p>

              <blockquote class="text-slate-900 text-xl">
                <input type="checkbox" id="vegano">
                <label class="mr-4" for="vegano">Vegano</label>
                <input type="checkbox" id="no-lactosa">
                <label class="mr-4" for="no-lactosa">Intolerante a la lactosa</label>
                <input type="checkbox" id="celiaco">
                <label class="mr-4" for="celiaco">Intolerante al gluten</label>
              </blockquote>  

              <button
                type="button"
                id="validar"
                class="self-start rounded-md bg-amber-400 px-4 py-2 font-semibold text-slate-950 hover:bg-amber-300"
              >
                validar el pedido
              </button>

              <p id="mensaje" class="text-lg font-semibold text-amber-700"></p>

          </div>
        </div>
         
        <div class="shrink-0 sm:ml-auto flex flex-col gap-6">
        <img
          src="img/yum.gif"
          alt="illustracion de comida"
          class="mt-24 auto w-auto max-w-24 max-h-24 shrink-0 self-center rounded-lg object-contain shadow-md sm:self-start sm:ml-auto"
        />
        <img
          src="img/hi.webp"
          alt="hi"
          class="h-auto w-auto max-w-24 max-h-24 shrink-0 self-center rounded-lg object-contain shadow-md sm:self-start sm:ml-auto"
        />
</div>
      </div>
      <div
        class="mt-6 flex w-full max-w-4xl flex-wrap items-center justify-center gap-6 self-center"
      >
        <img
          src="img/comida.gif"
          alt="comida"
          class="h-auto w-auto max-w-80 max-h-80 rounded-lg object-contain shadow-md"
        />
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
